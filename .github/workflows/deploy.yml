name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Prepare static files for GitHub Pages
        run: |
          # Create 404.html so direct navigation and refreshes work on GitHub Pages
          cp out/index.html out/404.html
          # Create .nojekyll to prevent Jekyll processing
          touch out/.nojekyll

          # Add cache buster to the hero image to fight GitHub Pages aggressive CDN caching
          # This ensures visitors see the latest photo on first visit instead of stale cached version
          TIMESTAMP=$(date +%s)
          sed -i "s|cheukyin-lam.png|cheukyin-lam.png?cb=${TIMESTAMP}|g" out/index.html
          sed -i "s|cheukyin-lam.png|cheukyin-lam.png?cb=${TIMESTAMP}|g" out/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
